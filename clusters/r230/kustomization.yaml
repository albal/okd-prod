apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Explicitly including everything ensures you don't miss anything
# and gives you control over the order if necessary.
resources:
  - node-labels.yaml
  - local-storage-operator.yaml
  - LocalVolume.yaml
  - StorageCluster.yaml
  - StorageClass.yaml
  - cert-manager-operator.yaml
  - ClusterIssuer.yaml
  - certs.yaml
  - cert-manager-config.yaml
  - console-plugins.yaml
  - MachineConfigs.yaml
