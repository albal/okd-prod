apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ingress-certs-public
  namespace: openshift-ingress
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  secretName: ingress-certs-public
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "*.apps.r230.lab.tsew.net"  # Your wildcard apps domain
  dnsNames:
    - "*.apps.r230.lab.tsew.net"
    - "apps.r230.lab.tsew.net"
---
apiVersion: operator.openshift.io/v1
kind: IngressController
metadata:
  name: default
  namespace: openshift-ingress-operator
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  defaultCertificate:
    name: ingress-certs-public  # cert-manager will create this secret
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: api-certs
  namespace: openshift-config
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  secretName: api-certs-public
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: api.r230.lab.tsew.net
  dnsNames:
    - api.r230.lab.tsew.net
---
apiVersion: config.openshift.io/v1
kind: APIServer
metadata:
  name: cluster
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  servingCerts:
    namedCertificates:
      - names:
          - api.r230.lab.tsew.net
        servingCertificate:
          name: api-certs-public
