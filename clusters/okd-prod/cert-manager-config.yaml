apiVersion: operator.openshift.io/v1alpha1
kind: CertManager
metadata:
  name: cluster
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  managementState: Managed
  controllerConfig:
    overrideArgs:
      - '--dns01-recursive-nameservers=1.1.1.1:53,1.0.0.1:53'
      - '--dns01-recursive-nameservers-only'
