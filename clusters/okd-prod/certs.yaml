---
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager-operator
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: cert-manager-operator-group
  namespace: cert-manager-operator
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  targetNamespaces:
    - cert-manager-operator
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: openshift-cert-manager-operator
  namespace: cert-manager-operator
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  channel: stable-v1  # Adjust based on your OKD version's catalog
  installPlanApproval: Automatic
  name: openshift-cert-manager-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ingress-certs-public
  namespace: openshift-ingress
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  secretName: ingress-certs-public
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "*.apps.okd.dev.tsew.net"  # Your wildcard apps domain
  dnsNames:
    - "*.apps.okd.dev.tsew.net"
    - "apps.okd.dev.tsew.net"
---
apiVersion: operator.openshift.io/v1
kind: IngressController
metadata:
  name: default
  namespace: openshift-ingress-operator
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  defaultCertificate:
    name: ingress-certs-public  # cert-manager will create this secret
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: api-certs
  namespace: openshift-config
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  secretName: api-certs-public
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: api.okd.dev.tsew.net
  dnsNames:
    - api.okd.dev.tsew.net
---
apiVersion: config.openshift.io/v1
kind: APIServer
metadata:
  name: cluster
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  servingCerts:
    namedCertificates:
      - names:
          - api.okd.dev.tsew.net
        servingCertificate:
          name: api-certs-public
