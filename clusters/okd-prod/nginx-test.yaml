---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-hello
  namespace: nginx-hello
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-hello
  template:
    metadata:
      labels:
        app: nginx-hello
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        # Simple hack to make Nginx say Hello World without a custom image
        command: ["/bin/sh", "-c"]
        args: 
          - echo "Hello World from OKD!" > /usr/share/nginx/html/index.html && nginx -g 'daemon off;'
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-hello-svc
  namespace: nginx-hello
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  selector:
    app: nginx-hello
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: nginx-hello-route
  namespace: nginx-hello
  annotations:
    argocd.argoproj.io/sync-wave: "7"
    # This tells OKD to use the certificate we managed via cert-manager
    # Note: cert-manager can automatically inject certs into routes 
    # if you have the OpenShift route-controller enabled.
    cert-manager.io/issuer: "letsencrypt-cloudflare"
spec:
  host: hello.apps.okd.dev.tsew.net
  to:
    kind: Service
    name: nginx-hello-svc
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
